name: Daily AI Tool Update

on:
  schedule:
    # 한국시간 새벽 5시 (UTC 20:00)
    - cron: '0 20 * * *'
    # 미국 동부시간 새벽 5시 (UTC 10:00)
    - cron: '0 10 * * *'
    # 한국시간 오후 8시 - 이슈 발행용 (UTC 11:00)
    - cron: '0 11 * * *'
  workflow_dispatch: # 수동 실행도 가능

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code to update README
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --allowedTools 'Bash(*)' 'Read(*)' 'Write(*)' 'Edit(*)' 'Glob(*)' 'Grep(*)' 'WebSearch(*)' 'WebFetch(*)'"
          use_bedrock: false
          use_vertex: false
          prompt: |
            You are the auto-update agent for the "WhatChelin?" project.

            ## Task Goal
            Search for the latest information on AI coding & productivity tools and update both README.md (English) and README_ko.md (Korean).

            ## Current Schedule Context
            - UTC 20:00 (KST 05:00): Morning update — search for changes and update both READMEs
            - UTC 10:00 (EST 05:00): Morning update — search for changes and update both READMEs
            - UTC 11:00 (KST 20:00): Evening run — review both READMEs and publish improvement/error issues

            Detect which schedule triggered this run by checking the current UTC hour:
            - If UTC hour is 11: this is the KST 20:00 issue-publishing run
            - Otherwise: this is a regular morning update run

            ## Tasks to Perform

            ### [Morning Update Run — UTC 20:00 or UTC 10:00]

            #### 1. Search for latest info and update both READMEs
            Search the internet to check for the latest changes in these tools:
            - Price changes, new plans launched, plans discontinued
            - New model releases (GPT, Claude, Gemini, etc.)
            - Major feature updates
            - New AI coding tools emerging
            - Community hot topics (outages, controversies, migrations, etc.)

            If there are changes, update the relevant sections in both README.md and README_ko.md.
            If there are no changes, leave them as-is.

            **Translation rules when updating both files:**
            - README.md is in English — keep all content in English
            - README_ko.md is in Korean — keep all content in Korean
            - "Vibe Coder" in English = "바이브코더" in Korean
            - "Creator" in English = "크리에이터" in Korean
            - "General Office" in English = "일반사무" in Korean
            - "Non-coder" in English = "논코더" in Korean
            - "WhatChelin" in English = "뭐슐랭" in Korean
            - Tool names, URLs, badges, and Mermaid charts remain unchanged in both files
            - Community quotes: use original English in README.md, Korean translation in README_ko.md

            #### 2. Record popularity data
            Add today's popularity scores to data/popularity.csv.
            Score criteria (0~100):
            - Community mention volume, Reddit/HN trending
            - Recent update frequency
            - Developer satisfaction trend
            - Market share changes

            CSV format: date,claude_code,cursor,github_copilot,windsurf,codex_cli,antigravity,gemini_cli,aider,chatgpt,claude_ai

            #### 3. Update competition chart in both READMEs
            Based on the last 14 days of data in data/popularity.csv,
            update the Mermaid xychart between POPULARITY_CHART_START and POPULARITY_CHART_END
            in both README.md and README_ko.md.

            #### 4. Commit changes
            If there are changes, commit directly with git add and git commit.
            Commit message: "auto: daily update (YYYY-MM-DD)"

            #### 5. Write daily news posts — English AND Korean (mandatory)
            After committing README/CSV changes, create TWO Jekyll news posts every day without exception:
            - English: docs/_posts/YYYY-MM-DD-daily-update.md
            - Korean: docs/ko/_posts/YYYY-MM-DD-daily-update.md

            English post format:
            ```markdown
            ---
            title: "AI WhatChelin Daily — Month DD, YYYY"
            date: YYYY-MM-DD
            lang: en
            tags: [daily, popularity, relevant-tags]
            ---

            One-line summary of today's highlights.

            ## Popularity Scores

            | Tool | Score | Trend |
            |---|---|---|
            (today's scores with trend vs yesterday)

            ## Key Changes

            - **Change title**: Description
            (if none, write "No major changes today.")

            ## Sources

            Comma-separated list of sources searched.
            ```

            Korean post format:
            ```markdown
            ---
            title: "AI 뭐슐랭 데일리 — YYYY년 MM월 DD일"
            date: YYYY-MM-DD
            lang: ko
            tags: [daily, popularity, relevant-tags]
            ---

            오늘의 하이라이트 한 줄 요약.

            ## 인기도 점수

            | 도구 | 점수 | 추세 |
            |---|---|---|
            (오늘 점수와 어제 대비 변동)

            ## 주요 변경사항

            - **변경 제목**: 설명
            (없으면 "오늘 주요 변경사항 없음.")

            ## 출처

            쉼표로 구분된 검색 소스 목록.
            ```

            Translation rules for Korean posts:
            - Tool names remain in English (ChatGPT, Claude Code, Cursor, etc.)
            - Section headings in Korean
            - Key changes descriptions translated to natural Korean
            - "Notable" summary translated to Korean

            Important: Create BOTH posts even if only the popularity CSV was updated. Never skip.
            After creating both posts, stage them and include in the git commit.

            ---

            ### [Issue Publishing Run — UTC 11:00 / KST 20:00]

            #### 1. Review both READMEs
            Read README.md and README_ko.md carefully and identify:
            - Factual errors (wrong prices, wrong model names, discontinued tools still listed, etc.)
            - Consistency issues between English and Korean versions
            - Missing tools that should be added
            - Outdated information that needs verification
            - Structural or formatting improvements

            #### 2. Publish GitHub issues
            For each problem or improvement found, create a GitHub issue using gh CLI:

            ```
            gh issue create --title "Issue title" --body "Issue body" --label "bug"
            ```

            Use appropriate labels:
            - "bug" for factual errors
            - "enhancement" for improvements or missing content
            - "documentation" for formatting/structure issues

            Issue body should include:
            - Which file(s) are affected (README.md, README_ko.md, or both)
            - What the current content says
            - What it should say or what needs to be verified
            - Suggested fix if applicable

            Create at least 1 issue per run. If nothing is found, create an issue titled
            "Daily Review: No issues found (YYYY-MM-DD)" to confirm the review was done.

            ---

            ## Rules (apply to all runs)
            - Maintain the existing structure and style of each README
            - Update the fact check log date to today
            - Always include dates in community quotes
            - Do not make unnecessary edits if there are no changes
            - README.md must stay in English, README_ko.md must stay in Korean
